function updateNav() {
  const y = window.scrollY + 70;
  let cur = '';
  document.querySelectorAll('section[id]').forEach(s => { if (y >= s.offsetTop) cur = s.id; });
  document.querySelectorAll('.nav-links a[href^="#"]').forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + cur));
}

function checkReveal() {
  const vh = window.innerHeight;
  document.querySelectorAll('.reveal').forEach(el => { if (el.getBoundingClientRect().top < vh - 50) el.classList.add('on'); });
}

window.addEventListener('scroll', () => { updateNav(); checkReveal(); }, { passive: true });
updateNav(); checkReveal();

function handleNL(e) {
  e.preventDefault();
  e.target.style.display = 'none';
  document.getElementById('nl-ok').style.display = 'block';
}
