  .foot-col ul a{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;}

  .foot-bottom{max-width:1060px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}

  .foot-social{display:flex;gap:.45rem;}

  .foot-social a:hover{background:var(--teal);color:#fff;}

  /* ── MOBILE ── */
  @media(max-width:860px){
    /* show hamburger, hide desktop links */
    .nav-burger{display:flex;}
    .nav-links{display:none;}
    nav{padding:0 1.25rem;}

    .hero-content{padding:0 1.5rem 3.5rem;}
    .hero-stats{gap:1.5rem;}

    /* mobile mosaic: just 2 photos side by side */
    .mosaic{
      grid-template-columns:1fr 1fr;
      grid-template-rows:200px;
      gap:8px;padding:10px;
    }
    .mosaic-item{border-radius:10px;height:200px;}
    /* show only first 2 items on mobile */
    .mosaic-item:nth-child(n+3){display:none;}
    .mosaic-item:nth-child(1){grid-column:1;grid-row:1;}
    .mosaic-item:nth-child(2){grid-column:2;grid-row:1;}

    .story-top,.vol-header,.foot-inner{grid-template-columns:1fr;gap:2rem;}
    .prog-grid,.support-cards,.social-cards,.principles-grid,.vol-roles,.ep-cards{grid-template-columns:1fr;}
    .impact-div{display:none;}
    .impact-strip{justify-content:center;gap:1.5rem;}

    /* volunteer video on mobile — show as poster fallback if video fails */
    .vol-header video{height:240px;}

    #hours,#programs,#support,#story,#volunteer,#events-preview,#social,#impact{padding:3.5rem 1.25rem;}
    .story-inner,.programs-inner,.support-inner,.vol-inner,.events-preview-inner,.nl-inner{padding:3.5rem 1.25rem;}
    footer{padding:2.5rem 1.25rem 2rem;}
    .foot-inner{gap:2rem;}
  }

  @media(max-width:480px){
    .hero-stats{flex-wrap:wrap;gap:1rem;}
    .nl-form{flex-direction:column;}
    .nl-form button{width:100%;}
  }
`;

/* ── HAMBURGER ── */
const burger = document.getElementById('burger');
const drawer = document.getElementById('drawer');
burger.addEventListener('click', () => {
  burger.classList.toggle('open');
  drawer.classList.toggle('open');
});
drawer.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    burger.classList.remove('open');
    drawer.classList.remove('open');
  });
});

/* ── SCROLL SPY NAV ── */
const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.nav-links a[href^="#"]');
function updateNav() {
  const y = window.scrollY + 70;
  let cur = '';
  sections.forEach(s => { if (y >= s.offsetTop) cur = s.id; });
  navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + cur));
}

/* ── REVEAL ON SCROLL ── */
const revs = document.querySelectorAll('.reveal');
function checkReveal() {
  const vh = window.innerHeight;
  revs.forEach(el => { if (el.getBoundingClientRect().top < vh - 50) el.classList.add('on'); });
}

/* ── VIDEO — play when in view, fallback gracefully ── */
const volVideo = document.getElementById('vol-video');
let videoPlaying = false;
function checkVideo() {
  if (!volVideo) return;
  const rect = volVideo.getBoundingClientRect();
  const inView = rect.top < window.innerHeight * 0.9 && rect.bottom > 0;
  if (inView && !videoPlaying) {
    const p = volVideo.play();
    if (p !== undefined) p.catch(() => { videoPlaying = false; });
    videoPlaying = true;
  } else if (!inView && videoPlaying) {
    volVideo.pause();
    videoPlaying = false;
  }
}

window.addEventListener('scroll', () => { updateNav(); checkReveal(); checkVideo(); }, { passive: true });
updateNav(); checkReveal();
/* small delay so video element is fully in DOM before first check */
setTimeout(checkVideo, 300);

/* ── NEWSLETTER ── */
function handleNL(e) {
  e.preventDefault();
  e.target.style.display = 'none';
  document.getElementById('nl-ok').style.display = 'block';
}
</script>
